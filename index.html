<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>正在跳转...</title>
  <script>
    const target = "https://blog.idapro.tech";
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    window.location.replace(target + path + search + hash);
  </script>
</head>
<body>
  <p>正在跳转到 <a id="link" href="#">blog.idapro.tech</a> ...</p>
  <script>
    const t="https://blog.idapro.tech";
    document.getElementById("link").href = t + window.location.pathname + window.location.search + window.location.hash;
  </script>
</body>
</html>
